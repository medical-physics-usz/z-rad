---
version: 2
updates:
  # Update Python dependencies declared in `pyproject.toml`
  - package-ecosystem: "pip"
    directory: "/" # Directory where pyproject.toml is located
    schedule:
      interval: "weekly" # Frequency of checks (daily, weekly, or monthly)

  # Update GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
