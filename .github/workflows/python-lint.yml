---
name: Python Lint

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: python -m pip install -e ".[lint]"

      - name: Check formatting
        run: ruff format --check zrad tests main.py generate_executable.py

      - name: Run linter
        run: ruff check zrad tests main.py generate_executable.py
